<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanning your bills... | Finder One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Simulate a scanning process before redirecting to results
        setTimeout(() => {
            document.getElementById('status-text').innerText = "Found 3 recent utility bills...";
        }, 1500);
        setTimeout(() => {
            document.getElementById('status-text').innerText = "Analyzing mortgage statements...";
        }, 3000);
        setTimeout(() => {
            document.getElementById('status-text').innerText = "Cross-referencing 2,400 market rates...";
        }, 4500);
        setTimeout(() => {
            window.location.href = "results.html";
        }, 6500);
    </script>
</head>
<body class="bg-black text-white font-sans h-screen flex flex-col items-center justify-center">
    <div class="text-center max-w-md w-full px-6">
        <div class="mb-10 relative">
            <div class="w-24 h-24 border-4 border-gray-800 border-t-blue-500 rounded-full animate-spin mx-auto"></div>
            <div class="absolute inset-0 flex items-center justify-center text-3xl">🤖</div>
        </div>
        <h2 class="text-3xl font-bold mb-4">Our robot is working...</h2>
        <p id="status-text" class="text-gray-400 text-lg h-8 transition-all">Securely connecting to inbox...</p>
        
        <div class="w-full bg-gray-900 rounded-full h-2 mb-4 mt-8 overflow-hidden">
            <div class="bg-blue-600 h-2 rounded-full animate-[progress_6.5s_ease-in-out_forwards]" style="width: 0%"></div>
        </div>
    </div>

    <style>
        @keyframes progress {
            0% { width: 0%; }
            20% { width: 30%; }
            50% { width: 60%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }
    </style>
</body>
</html>
