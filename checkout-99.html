<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white flex flex-col md:flex-row min-h-screen font-sans">
    <!-- Left panel (Order Summary) -->
    <div class="w-full md:w-1/2 bg-gray-50 md:border-r border-gray-200 flex justify-center md:justify-end p-8 md:p-10">
        <div class="max-w-md w-full mt-4 md:mt-10">
            <div class="flex items-center mb-6">
                <div class="w-10 h-10 bg-black text-white rounded-lg flex items-center justify-center font-bold text-xl mr-3">f.</div>
                <div class="text-xl font-bold">finder<span class="text-gray-500">ONE</span></div>
            </div>
            <div class="text-gray-500 mb-2">Purchase Robo Advice Blueprint</div>
            <div class="text-4xl font-bold mb-8">$99.00 <span class="text-lg text-gray-500 font-normal">one-time</span></div>
            
            <div class="flex justify-between items-center py-4 border-t border-gray-200">
                <div class="font-semibold text-gray-700">Robo Advice Blueprint (One-Off)</div>
                <div class="font-semibold text-gray-700">$99.00</div>
            </div>
            <div class="flex justify-between items-center py-4 border-t border-b border-gray-200">
                <div class="font-bold text-gray-900">Total due today</div>
                <div class="font-bold text-gray-900">$99.00</div>
            </div>
        </div>
    </div>
    
    <!-- Right panel (Payment form) -->
    <div class="w-full md:w-1/2 bg-white p-8 md:p-10 flex justify-center md:justify-start">
        <div class="max-w-md w-full mt-4 md:mt-10">
            <h2 class="text-xl font-bold mb-6 text-gray-900">Pay with card</h2>
            <form action="waitlist.html" method="GET">
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" class="w-full border border-gray-300 rounded-md p-3 shadow-sm focus:ring-blue-500 focus:border-blue-500 outline-none transition" value="fred@finder.com" required>
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Card information</label>
                    <div class="border border-gray-300 rounded-md shadow-sm overflow-hidden focus-within:ring-1 focus-within:ring-blue-500 focus-within:border-blue-500 transition">
                        <input type="text" placeholder="1234 1234 1234 1234" class="w-full border-b border-gray-300 p-3 outline-none" required>
                        <div class="flex">
                            <input type="text" placeholder="MM / YY" class="w-1/2 border-r border-gray-300 p-3 outline-none" required>
                            <input type="text" placeholder="CVC" class="w-1/2 p-3 outline-none" required>
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Name on card</label>
                    <input type="text" class="w-full border border-gray-300 rounded-md p-3 shadow-sm focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Fred Schebesta" required>
                </div>

                <button type="submit" class="w-full bg-[#0074d4] hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-md shadow-sm transition mt-2">
                    Pay $99.00
                </button>
                <p class="text-center text-xs text-gray-500 mt-6 flex items-center justify-center font-medium">
                    <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C9.243 2 7 4.243 7 7v3H6c-1.103 0-2 .897-2 2v8c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-8c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5zm-3 8V7c0-1.654 1.346-3 3-3s3 1.346 3 3v3H9z"/></svg>
                    Powered by Stripe
                </p>
            </form>
        </div>
    </div>
</body>
</html>
